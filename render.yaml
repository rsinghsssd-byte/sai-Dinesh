services:
  - type: web
    name: github-plagiarism-detector
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free

    # Persistent disk so SQLite job history survives redeploys
    disk:
      name: plagcheck-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      - key: PLAGCHECK_DB_PATH
        value: /app/data/jobs.db
      - key: FRONTEND_DIR
        value: /app/frontend
      - key: CORS_ORIGINS
        value: "*"
      # Optional: add your GitHub token to avoid rate-limiting when cloning many repos
      # - key: GITHUB_TOKEN
      #   sync: false
